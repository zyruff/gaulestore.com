<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaule Store</title>
    <style>
        body { font-family: sans-serif; margin: 0; background-color: #f4f4f4; }
        .header { display: flex; align-items: center; padding: 15px; background: white; border-bottom: 2px solid #dc2626; justify-content: space-between; }
        .menu-icon { font-size: 28px; cursor: pointer; }
        #nav-menu { display: none; position: absolute; top: 0; left: 0; background: #fff; border: 1px solid #ccc; padding: 20px; width: 250px; height: 100%; z-index: 1000; box-shadow: 2px 2px 10px #ccc; }
        .menu-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .close-btn { font-size: 30px; cursor: pointer; color: #dc2626; }
        .search-box { display: flex; gap: 5px; margin-bottom: 20px; }
        #gameSearch { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .header-right { display: flex; align-items: center; gap: 10px; position: relative; }
        #profile-pic { width: 35px; height: 35px; border-radius: 50%; display: none; cursor: pointer; border: 2px solid #dc2626; }
        #profile-dropdown { display: none; position: absolute; top: 50px; right: 0; background: white; border: 1px solid #ccc; padding: 15px; width: 200px; box-shadow: 0px 4px 10px rgba(0,0,0,0.1); border-radius: 8px; text-align: center; z-index: 1000; }
        .user-name { font-weight: bold; font-size: 14px; margin-bottom: 5px; }
        .user-email { font-size: 12px; color: #666; margin-bottom: 10px; }
        .change-name { font-size: 11px; color: #dc2626; text-decoration: none; display: block; margin-bottom: 15px; }
        .logout-btn { background: #dc2626; color: white; border: none; padding: 8px 20px; cursor: pointer; border-radius: 4px; }
        #nav-menu a { display: block; padding: 12px 0; color: black; text-decoration: none; border-bottom: 1px solid #eee; }
        .order-card { background: white; border-left: 5px solid #dc2626; padding: 10px; margin-bottom: 8px; border-radius: 5px; box-shadow: 0 2px 5px #ddd; }
        .store-title { font-size: 1.5rem; font-weight: bold; }
        .login-svg { width: 32px; height: 32px; cursor: pointer; stroke: black; fill: none; }
    </style>
</head>
<body>

<div class="header">
    <div class="menu-icon" onclick="toggleMenu()">&#9776;</div>
    <div class="store-title">GAULE <span style="color:#dc2626;">STORE</span></div>
    <div class="header-right">
        <div id="login-container" onclick="googleLogin()">
            <svg class="login-svg" viewBox="0 0 24 24" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        </div>
        <img id="profile-pic" onclick="toggleProfile()">
        <div id="profile-dropdown">
            <div id="display-name" class="user-name"></div>
            <div id="display-email" class="user-email"></div>
            <a href="https://myaccount.google.com/personal-info" target="_blank" class="change-name">Change Name</a>
            <button class="logout-btn" onclick="logoutUser()">Logout</button>
        </div>
    </div>
</div>

<div id="nav-menu">
    <div class="menu-header">
        <span style="font-weight:bold;">Menu</span>
        <span class="close-btn" onclick="toggleMenu()">&times;</span>
    </div>
    <div class="search-box">
        <input type="text" id="gameSearch" placeholder="Search games...">
        <button onclick="alert('Searching...')">Search</button>
    </div>
    <a href="index.html">Home</a>
    <div id="my-orders-link" style="display:none;"><a href="#" onclick="showOrders()">My Orders</a></div>
    <a href="shop.html">Shop</a>
    <a href="https://wa.me/9779761081110" target="_blank">Contact Us</a>
</div>

<div id="content-area" style="padding: 20px;"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getDatabase, ref, query, orderByChild, equalTo, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBn0kORKJHN_X4uVidhjulK-dAnRujOO3A",
        authDomain: "gaule-top-up-center.firebaseapp.com",
        databaseURL: "https://gaule-top-up-center-default-rtdb.firebaseio.com",
        projectId: "gaule-top-up-center",
        storageBucket: "gaule-top-up-center.firebasestorage.app",
        messagingSenderId: "645605489690",
        appId: "1:645605489690:web:10e333176acd07eec1e5a3"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const provider = new GoogleAuthProvider();

    window.toggleMenu = () => { const m = document.getElementById("nav-menu"); m.style.display = (m.style.display === "block") ? "none" : "block"; };
    window.toggleProfile = () => { const d = document.getElementById("profile-dropdown"); d.style.display = (d.style.display === "block") ? "none" : "block"; };
    window.googleLogin = () => signInWithPopup(auth, provider);
    window.logoutUser = () => signOut(auth).then(() => location.reload());

    window.showOrders = () => {
        toggleMenu();
        const user = auth.currentUser;
        if (!user) return;
        
        const area = document.getElementById("content-area");
        
        // पछाडि फर्किने बटन र हेडिङ
        area.innerHTML = `
            <button onclick="location.reload()" style="margin-bottom:15px; padding:8px 15px; background:#333; color:white; border:none; border-radius:5px; cursor:pointer;">
                ← Back
            </button>
            <h2>My Orders</h2>
        `;

        const ordersRef = query(ref(db, 'orders'), orderByChild('userId'), equalTo(user.uid));
        
        onValue(ordersRef, (snapshot) => {
            // अर्डर सूची देखाउनु अघि 'Back' बटन यथावत राख्न
            let orderHtml = `
                <button onclick="location.reload()" style="margin-bottom:15px; padding:8px 15px; background:#333; color:white; border:none; border-radius:5px; cursor:pointer;">
                    ← Back
                </button>
                <h2>My Orders</h2>
            `;
            
            let orderArray = [];
            snapshot.forEach((s) => { orderArray.push(s.val()); });
            orderArray.reverse(); 

            if (orderArray.length > 0) {
                orderArray.forEach((o) => {
                    let statusColor = '#eab308';
                    if (o.status === 'Complete') statusColor = 'green';
                    else if (o.status === 'Rejected') statusColor = 'red';

                    orderHtml += `
                        <div class="order-card">
                            <p style="font-size: 14px; margin: 3px 0;">Product: <b>${o.product || "N/A"}</b></p>
                            <p style="font-size: 14px; margin: 3px 0;">Player ID: <b>${o.uid || "N/A"}</b></p>
                            <p style="font-size: 14px; margin: 3px 0;">Status: <b style="color:${statusColor}">${o.status}</b></p>
                        </div>`;
                });
                area.innerHTML = orderHtml;
            } else { 
                area.innerHTML = orderHtml + "<p>No Order History</p>"; 
            }
        });
    };


    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById("my-orders-link").style.display = "block";
            document.getElementById("login-container").style.display = "none";
            document.getElementById("profile-pic").style.display = "block";
            document.getElementById("profile-pic").src = user.photoURL;
            document.getElementById("display-name").innerText = user.displayName;
            document.getElementById("display-email").innerText = user.email;
        }
    });
</script><!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Fire Likes</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:Arial,sans-serif; }
        body { background:#f4f4f4; }
        
        /* यहाँ परिवर्तन गरिएको छ: width 100% र margin-top मात्र राखिएको छ */
        .container { 
            width: 100%; 
            min-height: 100vh;
            background:#fff; 
            padding: 20px; 
        }
        
        .back-btn { display: inline-block; padding: 8px 15px; background: #eee; color: #333; text-decoration: none; border-radius: 5px; margin-bottom: 15px; font-weight: bold; }
        h1 { text-align:center; color:#ff6600; margin-bottom:20px; }
        .step { margin-top:20px; font-size:18px; font-weight:bold; color:#333; }
        .product { display:block; padding:15px; margin-top:10px; background:#fafafa; border:2px solid #eee; border-radius:10px; cursor:pointer; }
        
        .qr-container { display: flex; justify-content: center; margin-top: 15px; }
        .qr-img { width: 250px; height: 250px; object-fit: cover; border: 2px solid #ccc; border-radius: 10px; }

        input[type=text] { width:100%; padding:15px; margin-top:10px; border:1px solid #ccc; border-radius:8px; font-size: 16px; }
        button { width:100%; padding:18px; margin-top:20px; background:#ff6600; color:white; border:none; border-radius:8px; font-size:18px; cursor:pointer; font-weight:bold; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .status { margin-top:15px; text-align:center; font-weight:bold; color: #333; }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="back-btn">← Back</a>
    <h1>🔥 FREE FIRE LIKES</h1>

    <div class="step">Step 1: Select Product</div>
    <label class="product">
        <input type="radio" name="product" value="20 Like Free Daily" onclick="togglePayment(false)" checked> 20 Like Free Daily
    </label>
    <label class="product">
        <input type="radio" name="product" value="220 Like Rs.30" onclick="togglePayment(true)"> 220 Like Rs.30
    </label>

    <div class="step">Step 2: Enter UID</div>
    <input type="text" id="uid" placeholder="Enter Free Fire UID">

    <!-- Payment Section -->
    <div id="paymentSection" style="display: none;">
        <div class="step">Step 3: Scan QR Code</div>
        <div class="qr-container">
            <img src="qr_code.png" class="qr-img" alt="QR Code">
        </div>
        <div class="step" style="font-size: 14px; color: #555; text-align: center;">Write your real name in the remarks</div>
        <div class="step">Step 4: Enter Transaction ID</div>
        <input type="text" id="transactionId" placeholder="Enter Transaction ID">
    </div>

    <div class="step">Step 5: Submit Order</div>
    <button id="submitBtn" onclick="submitOrder()">Submit Order</button>
    <div class="status" id="status"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBn0kORKJHN_X4uVidhjulK-dAnRujOO3A",
        authDomain: "gaule-top-up-center.firebaseapp.com",
        databaseURL: "https://gaule-top-up-center-default-rtdb.firebaseio.com",
        projectId: "gaule-top-up-center",
        storageBucket: "gaule-top-up-center.firebasestorage.app",
        messagingSenderId: "645605489690",
        appId: "1:645605489690:web:10e333176acd07eec1e5a3"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    let currentUser = null;
    onAuthStateChanged(auth, (user) => { currentUser = user; });

    window.togglePayment = (show) => {
        document.getElementById("paymentSection").style.display = show ? "block" : "none";
    };

    window.submitOrder = async () => {
        if (!currentUser) { alert("Please Login First"); return; }
        
        const product = document.querySelector('input[name="product"]:checked').value;
        const uid = document.getElementById("uid").value.trim();
        const transId = document.getElementById("transactionId").value.trim();

        if (uid === "") {
            alert("Please Enter UID");
            return;
        }

        if (product === "220 Like Rs.30" && transId === "") {
            alert("Please Enter Transaction ID");
            return;
        }

        const btn = document.getElementById("submitBtn");
        btn.disabled = true;
        btn.innerText = "Submitting...";

        try {
            await push(ref(db, "orders"), {
                product: product,
                uid: uid,
                transactionId: product === "220 Like Rs.30" ? transId : "N/A",
                name: currentUser.displayName || "No Name",
                email: currentUser.email,
                userId: currentUser.uid,
                status: "Pending",
                timestamp: Date.now(),
                date: new Date().toLocaleString()
            });

            document.getElementById("status").innerHTML = "✅ Order Submitted Successfully";
            btn.disabled = false;
            btn.innerText = "Submit Order";
            document.getElementById("uid").value = "";
            document.getElementById("transactionId").value = "";
        } catch (error) {
            document.getElementById("status").innerHTML = "❌ " + error.message;
            btn.disabled = false;
            btn.innerText = "Submit Order";
        }
    }
</script>

</body>
</html>
