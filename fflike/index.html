<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Fire Likes - Gaule Store</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:Arial,sans-serif; }
        body { background:#f4f4f4; padding-bottom: 50px; }
        .container { width: 100%; max-width: 500px; margin: auto; background:#fff; padding: 20px; min-height: 100vh; }
        .back-btn { display: inline-block; padding: 8px 15px; background: #eee; color: #333; text-decoration: none; border-radius: 5px; margin-bottom: 15px; font-weight: bold; }
        h1 { text-align:center; color:#ff6600; margin-bottom:20px; }
        .step { margin-top:20px; font-size:18px; font-weight:bold; color:#333; }
        .product { display:block; padding:15px; margin-top:10px; background:#fafafa; border:2px solid #eee; border-radius:10px; cursor:pointer; }
        .qr-container { display: flex; justify-content: center; margin-top: 15px; }
        .qr-img { width: 250px; height: 250px; object-fit: cover; border: 2px solid #ccc; border-radius: 10px; }
        input[type=text] { width:100%; padding:15px; margin-top:10px; border:1px solid #ccc; border-radius:8px; font-size: 16px; }
        button { width:100%; padding:18px; margin-top:20px; background:#ff6600; color:white; border:none; border-radius:8px; font-size:18px; cursor:pointer; font-weight:bold; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .status { margin-top:15px; text-align:center; font-weight:bold; color: #333; }

        /* Custom Modal Styles */
        #custom-modal { display: none; position: fixed; top: 30%; left: 10%; width: 80%; background: #fff; border: 3px solid #dc2626; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(220, 38, 38, 0.3); z-index: 1000; text-align: center; animation: shake 0.5s; }
        @keyframes shake { 0% { transform: translateX(-2%); } 50% { transform: translateX(2%); } 100% { transform: translateX(0); } }
        .modal-btn { background: #dc2626; color: white; border: none; padding: 10px 20px; margin-top: 15px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="back-btn">← Back</a>
    <h1>🔥 FREE FIRE LIKES</h1>
    
    <div class="step">Step 1: Select Product</div>
    <label class="product">
        <input type="radio" name="product" value="20 Like Free Daily" onclick="togglePayment(false)" checked> 20 Like Free Daily
    </label>
    <label class="product">
        <input type="radio" name="product" value="220 Like Rs.30" onclick="togglePayment(true)"> 220 Like Rs.30
    </label>

    <div class="step">Step 2: Enter UID</div>
    <input type="text" id="uid" placeholder="Enter Free Fire UID">

    <div id="paymentSection" style="display: none;">
        <div class="step">Step 3: Scan QR Code</div>
        <div class="qr-container">
            <img src="qr_code.png" class="qr-img" alt="QR Code">
        </div>
        <div class="step" style="font-size: 14px; color: #555; text-align: center;">Write your real name in the remarks</div>
        <div class="step">Step 4: Enter Transaction ID</div>
        <input type="text" id="transactionId" placeholder="Enter Transaction ID">
    </div>

    <div class="step">Step 5: Submit Order</div>
    <button id="submitBtn" onclick="submitOrder()">Submit Order</button>
    <div class="status" id="status"></div>
</div>

<!-- Custom Modal Box -->
<div id="custom-modal">
    <h3 style="color: #dc2626;">Limit Reached!</h3>
    <p style="margin-top: 10px; font-size: 15px;">You have already requested an order for this UID today. New orders are available after 4:00 AM.</p>
    <button class="modal-btn" onclick="document.getElementById('custom-modal').style.display='none'">OK</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getDatabase, ref, push, query, orderByChild, equalTo, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBn0kORKJHN_X4uVidhjulK-dAnRujOO3A",
        authDomain: "gaule-top-up-center.firebaseapp.com",
        databaseURL: "https://gaule-top-up-center-default-rtdb.firebaseio.com",
        projectId: "gaule-top-up-center",
        storageBucket: "gaule-top-up-center.firebasestorage.app",
        messagingSenderId: "645605489690",
        appId: "1:645605489690:web:10e333176acd07eec1e5a3"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    let currentUser = null;

    onAuthStateChanged(auth, (user) => { currentUser = user; });

    window.togglePayment = (show) => {
        document.getElementById("paymentSection").style.display = show ? "block" : "none";
    };

    const getFormattedDate = () => {
        let now = new Date();
        if (now.getHours() < 4) { now.setDate(now.getDate() - 1); }
        return now.toDateString();
    };

    window.submitOrder = async () => {
        if (!currentUser) { alert("Please Login First"); return; }
        
        const product = document.querySelector('input[name="product"]:checked').value;
        const uid = document.getElementById("uid").value.trim();
        const transId = document.getElementById("transactionId").value.trim();

        if (uid === "") { alert("Please Enter UID"); return; }
        if (product === "220 Like Rs.30" && transId === "") { alert("Please Enter Transaction ID"); return; }

        const btn = document.getElementById("submitBtn");
        btn.disabled = true;
        btn.innerText = "Checking...";

        try {
            const today = getFormattedDate();
            const ordersRef = ref(db, "orders");
            const q = query(ordersRef, orderByChild("uid"), equalTo(uid));
            const snapshot = await get(q);

            let alreadyOrdered = false;
            snapshot.forEach((child) => {
                if (child.val().dateString === today) { alreadyOrdered = true; }
            });

            if (alreadyOrdered) {
                document.getElementById("custom-modal").style.display = "block";
                btn.disabled = false;
                btn.innerText = "Submit Order";
                return;
            }

            await push(ref(db, "orders"), {
                product: product,
                uid: uid,
                transactionId: product === "220 Like Rs.30" ? transId : "N/A",
                name: currentUser.displayName || "No Name",
                email: currentUser.email,
                userId: currentUser.uid,
                status: "Pending",
                timestamp: Date.now(),
                dateString: today
            });

            document.getElementById("status").innerHTML = "✅ Order Submitted Successfully";
            btn.disabled = false;
            btn.innerText = "Submit Order";
            document.getElementById("uid").value = "";
            document.getElementById("transactionId").value = "";
        } catch (error) {
            document.getElementById("status").innerHTML = "❌ " + error.message;
            btn.disabled = false;
            btn.innerText = "Submit Order";
        }
    }
</script>

</body>
</html>
