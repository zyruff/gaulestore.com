<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <title>Free Fire Top-Up</title>
    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .card-container { width: 100%; max-width: 400px; }
        .header { text-align: center; margin-bottom: 20px; }
        .diamond-pack { 
            background: #1e1e1e; border: 1px solid #333; padding: 15px; 
            margin-bottom: 10px; border-radius: 12px; display: flex; 
            justify-content: space-between; align-items: center;
        }
        .buy-btn { 
            background: #ff4500; color: white; padding: 10px 20px; 
            border-radius: 8px; text-decoration: none; font-weight: bold;
        }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #888; text-decoration: none; }
    </style>
</head>
<body>

<div class="card-container">
    <div class="header">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/d3/Free_Fire_Logo.png/800px-Free_Fire_Logo.png" width="80">
        <h1>FREE FIRE</h1>
    </div>

    <div class="diamond-pack">
        <span>💎 100 Diamonds</span>
        <a href="https://wa.me/97798XXXXXXXX?text=I want 100 diamonds" class="buy-btn">Rs. 100</a>
    </div>

    <div class="diamond-pack">
        <span>💎 310 Diamonds</span>
        <a href="https://wa.me/97798XXXXXXXX?text=I want 310 diamonds" class="buy-btn">Rs. 280</a>
    </div>

    <div class="diamond-pack">
        <span>💎 520 Diamonds</span>
        <a href="https://wa.me/97798XXXXXXXX?text=I want 520 diamonds" class="buy-btn">Rs. 450</a>
    </div>

    <a href="index.html" class="back-link">← पछाडि जानुहोस्</a>
</div>

</body>
</html>
