<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="canonical" href="https://roshantamang2.com.np/" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaule Store - Official Custom Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background-color: #f7fafc; color: #2d3748; padding-bottom: 160px; }
        
        /* Banner & Tabs */
        .banner-container { padding: 16px; background: linear-gradient(180deg, #ffffff 0%, #f7fafc 100%); border-bottom: 1px solid #e2e8f0; }
        .badges-wrapper { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
        .badge { font-size: 11px; padding: 4px 10px; border-radius: 20px; font-weight: 500; }
        .badge.instant { background-color: rgba(255, 179, 0, 0.15); color: #b7791f; }
        .badge.official { background-color: rgba(46, 213, 115, 0.15); color: #1e7e34; }
        .avatar-img { width: 60px; height: 60px; border-radius: 50%; border: 2px solid #ffb300; object-fit: cover; }
        .banner-flex { display: flex; gap: 12px; align-items: center; }
        
        /* Maintenance Style - थपिएको कोड */
        .pack-card.maintenance {
            opacity: 0.5;
            cursor: not-allowed !important;
            position: relative;
            pointer-events: none;
        }
        .pack-card.maintenance::after {
            content: "MAINTENANCE";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-10deg);
            background: #e53e3e;
            color: white;
            padding: 5px 10px;
            font-size: 10px;
            font-weight: bold;
            border-radius: 5px;
            z-index: 10;
        }

        /* Packs Grid & Others */
        .section-box { margin: 20px 16px; }
        .cards-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .pack-card { background-color: #ffffff; border: 2px solid #e2e8f0; border-radius: 12px; padding: 16px; position: relative; cursor: pointer; transition: 0.2s; aspect-ratio: 1/1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; }
        .pack-card.selected { border: 2px solid #ffb300 !important; background-color: #fffdf5; }
        .pack-img { width: 70%; max-height: 60%; object-fit: contain; margin-bottom: auto; }
        .pack-title { font-size: 13px; font-weight: 600; margin-top: 8px; }
        .pack-price { font-size: 15px; font-weight: 700; color: #ffb300; }
        .uid-input { width: 100%; padding: 14px; border: 1px solid #cbd5e0; border-radius: 8px; margin-top: 8px; }
        .action-btn { width: 200px; height: 42px; background-color: #ffb300; color: white; border: none; border-radius: 25px; margin: 0 auto; display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: 700; cursor: pointer; }
        .bottom-drawer { position: fixed; bottom: 0; left: 0; right: 0; background: #ffffff; border-top: 1px solid #e2e8f0; padding: 16px; z-index: 100; }
    </style>
</head>
<body>

    <div class="banner-container">
        <div class="badges-wrapper">
            <div class="badge instant">1 min - 5 min Delivery</div>
            <div class="badge official"><i class="fa-solid fa-circle-check"></i> Official Supply</div>
        </div>
        <div class="banner-flex">
            <img class="avatar-img" src="ffglory.png" alt="Free Fire Logo">
            <div>
                <p class="banner-desc">Buy Garena Free Fire Guild Glory Bot in Nepal at the cheapest price with Gaule Store.</p>
            </div>
        </div>
    </div>

    <div class="section-box">
        <div class="box-title">GUILD ID</div>
        <input type="text" id="game-uid" class="uid-input" placeholder="Enter Guild ID">
    </div>

    <div class="section-box">
        <div class="box-title">Glory Bot</div>
        <div class="cards-grid" id="diamonds-wrapper">
            <!-- Maintenance मा राखिएको -->
            <div class="pack-card maintenance">
                <img src="ffglory.png" class="pack-img" alt="glorybot">
                <div class="pack-title">4 Glory Bot</div>
                <div class="pack-price">Rs215</div>
            </div>

            <!-- Maintenance मा राखिएको -->
            <div class="pack-card maintenance">
                <img src="ffglory.png" class="pack-img" alt="glorybot">
                <div class="pack-title">8 Glory Bot</div>
                <div class="pack-price">Rs400</div>
            </div>
        </div>
    </div>

    <div class="bottom-drawer">
        <button id="main-action-btn" class="action-btn">Buy Now</button>
    </div>

    <script type="module">
        // Firebase र अन्य स्क्रिप्ट यहाँ यथावत रहन्छ
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        // ... बाँकी Firebase कोड जुन तपाईंको मूल फाइलमा थियो ...
    </script>
</body>
</html>
