<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaule Store</title>
    <style>
        body { font-family: sans-serif; margin: 0; background-color: #f4f4f4; }
        .header { display: flex; align-items: center; padding: 15px; background: white; border-bottom: 2px solid #dc2626; justify-content: space-between; }
        .menu-icon { font-size: 28px; cursor: pointer; }
        #nav-menu { display: none; position: absolute; top: 0; left: 0; background: #fff; border: 1px solid #ccc; padding: 20px; width: 250px; height: 100%; z-index: 1000; box-shadow: 2px 2px 10px #ccc; }
        
        .menu-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .close-btn { font-size: 30px; cursor: pointer; color: #dc2626; }
        .search-box { display: flex; gap: 5px; margin-bottom: 20px; }
        #gameSearch { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        
        .header-right { display: flex; align-items: center; gap: 10px; position: relative; }
        #profile-pic { width: 35px; height: 35px; border-radius: 50%; display: none; cursor: pointer; border: 2px solid #dc2626; }
        
        #profile-dropdown { display: none; position: absolute; top: 50px; right: 0; background: white; border: 1px solid #ccc; padding: 15px; width: 200px; box-shadow: 0px 4px 10px rgba(0,0,0,0.1); border-radius: 8px; text-align: center; z-index: 1000; }
        .user-name { font-weight: bold; font-size: 14px; margin-bottom: 5px; }
        .user-email { font-size: 12px; color: #666; margin-bottom: 10px; }
        .change-name { font-size: 11px; color: #dc2626; text-decoration: none; display: block; margin-bottom: 15px; }
        .logout-btn { background: #dc2626; color: white; border: none; padding: 8px 20px; cursor: pointer; border-radius: 4px; }
        
        #nav-menu a { display: block; padding: 12px 0; color: black; text-decoration: none; border-bottom: 1px solid #eee; }
        .order-card { background: white; border-left: 5px solid #dc2626; padding: 15px; margin-bottom: 10px; border-radius: 5px; box-shadow: 0 2px 5px #ddd; }
        .store-title { font-size: 1.5rem; font-weight: bold; }
        .login-svg { width: 32px; height: 32px; cursor: pointer; stroke: black; fill: none; }
    </style>
</head>
<body>

<div class="header">
    <div class="menu-icon" onclick="toggleMenu()">&#9776;</div>
    <div class="store-title">GAULE <span style="color:#dc2626;">STORE</span></div>
    
    <div class="header-right">
        <div id="login-container" onclick="googleLogin()">
            <svg class="login-svg" viewBox="0 0 24 24" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        </div>
        <img id="profile-pic" onclick="toggleProfile()">
        
        <div id="profile-dropdown">
            <div id="display-name" class="user-name"></div>
            <div id="display-email" class="user-email"></div>
            <a href="https://myaccount.google.com/personal-info" target="_blank" class="change-name">Change Name</a>
            <button class="logout-btn" onclick="logoutUser()">Logout</button>
        </div>
    </div>
</div>

<div id="nav-menu">
    <div class="menu-header">
        <span style="font-weight:bold;">Menu</span>
        <span class="close-btn" onclick="toggleMenu()">&times;</span>
    </div>
    
    <div class="search-box">
        <input type="text" id="gameSearch" placeholder="Search games...">
    </div>
    
    <a href="index.html">Home</a>
    <div id="my-orders-link" style="display:none;"><a href="#" onclick="showOrders()">My Orders</a></div>
    <a href="shop.html">Shop</a>
    <a href="https://wa.me/9779761081110" target="_blank">Contact Us</a>
</div>

<div id="content-area" style="padding: 20px;"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getDatabase, ref, query, orderByChild, equalTo, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBn0kORKJHN_X4uVidhjulK-dAnRujOO3A",
        authDomain: "gaule-top-up-center.firebaseapp.com",
        databaseURL: "https://gaule-top-up-center-default-rtdb.firebaseio.com",
        projectId: "gaule-top-up-center",
        storageBucket: "gaule-top-up-center.firebasestorage.app",
        messagingSenderId: "645605489690",
        appId: "1:645605489690:web:10e333176acd07eec1e5a3"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const provider = new GoogleAuthProvider();

    window.toggleMenu = () => { const m = document.getElementById("nav-menu"); m.style.display = (m.style.display === "block") ? "none" : "block"; };
    window.toggleProfile = () => { const d = document.getElementById("profile-dropdown"); d.style.display = (d.style.display === "block") ? "none" : "block"; };
    
    window.googleLogin = () => signInWithPopup(auth, provider);
    window.logoutUser = () => signOut(auth).then(() => location.reload());

    window.showOrders = () => {
        toggleMenu();
        const user = auth.currentUser;
        if (!user) return;
        
        const area = document.getElementById("content-area");
        area.innerHTML = `<h2>My Orders</h2>`;
        
        const ordersRef = query(ref(db, 'orders'), orderByChild('userId'), equalTo(user.uid));
        onValue(ordersRef, (snapshot) => {
            area.innerHTML = `<h2>My Orders</h2>`;
            if (snapshot.exists()) {
                snapshot.forEach((s) => {
                    const data = s.val();
                    const email = data.email || user.email || "N/A";
                    const game = data.gameName || "Unknown";
                    const amount = data.amount || "N/A";
                    const status = data.status || "Pending";
                    
                    // Status रङ: Complete हरियो, Rejected रातो, अरू पहेँलो
                    const statusColor = (status.toLowerCase() === 'completed' || status.toLowerCase() === 'complete') ? 'green' : 
                                        (status.toLowerCase() === 'rejected') ? 'red' : '#eab308';
                    
                    area.innerHTML += `
                        <div class="order-card">
                            <p>Email: <b>${email}</b></p>
                            <p>Game: <b>${game}</b></p>
                            <p>Amount: <b>${amount}</b></p>
                            <p>Status: <b style="color:${statusColor}">${status}</b></p>
                        </div>`;
                });
            } else { area.innerHTML += "<p>No Order History</p>"; }
        });
    };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById("my-orders-link").style.display = "block";
            document.getElementById("login-container").style.display = "none";
            document.getElementById("profile-pic").style.display = "block";
            document.getElementById("profile-pic").src = user.photoURL;
            document.getElementById("display-name").innerText = user.displayName;
            document.getElementById("display-email").innerText = user.email;
        }
    });
</script>
</body>
</html>
<div style="max-width: 400px; margin: 20px auto; padding: 20px; border: 1px solid #ddd; border-radius: 10px;">
    <h3>Free Fire Top-Up</h3>
    <input type="text" id="playerId" placeholder="Enter Player ID" style="width: 100%; padding: 10px; margin-bottom: 10px;">
    <select id="amount" style="width: 100%; padding: 10px; margin-bottom: 10px;">
        <option value="115 Diamonds">115 Diamonds</option>
        <option value="240 Diamonds">240 Diamonds</option>
    </select>
    
    <button id="orderBtn" style="width: 100%; padding: 12px; background: #dc2626; color: white; border: none; cursor: pointer;">PLACE ORDER</button>
</div>

<script type="module">
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const auth = getAuth();
    const db = getDatabase();
    const provider = new GoogleAuthProvider();

    document.getElementById("orderBtn").onclick = async () => {
        const user = auth.currentUser;

        // १. यदि युजर लगइन छैन भने
        if (!user) {
            alert("Please login first to place an order!");
            try {
                await signInWithPopup(auth, provider);
                alert("Login Successful! Now you can order.");
            } catch (error) {
                console.error("Login failed", error);
            }
            return; // अर्डर हुन दिँदैन
        }

        // २. यदि युजर लगइन छ भने अर्डर सबमिट गर्ने
        const pid = document.getElementById("playerId").value;
        const amt = document.getElementById("amount").value;

        if(!pid) { alert("Please enter Player ID"); return; }

        push(ref(db, 'orders'), {
            name: user.displayName,
            email: user.email,
            playerId: pid,
            amount: amt,
            status: "Pending"
        }).then(() => {
            alert("Order Submitted!");
            document.getElementById("playerId").value = "";
        });
    };
</script>



<div style="max-width: 400px; margin: 20px auto; padding: 15px; border: 1px solid #ddd; border-radius: 10px; background: #fff;">
    <h3 style="text-align: center; color: #dc2626; margin-top: 0;">Live Order Status</h3>
    <div id="live-status-list">Loading...</div>
</div>

<script type="module">
    import { getDatabase, ref, onValue, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
    
    const db = getDatabase();
    const ordersRef = query(ref(db, 'orders'), limitToLast(10));

    onValue(ordersRef, (snapshot) => {
        const listDiv = document.getElementById("live-status-list");
        listDiv.innerHTML = ""; 

        if (snapshot.exists()) {
            const orders = [];
            snapshot.forEach((s) => { orders.push(s.val()); });
            
            orders.reverse().forEach((data) => {
                const name = data.name || "Unknown";
                const amount = data.amount || "N/A";
                const status = (data.status || "Pending").toUpperCase();
                
                let color = '#eab308'; // पहेँलो (Pending)
                if (status === 'COMPLETED' || status === 'COMPLETE') color = 'green';
                else if (status === 'REJECTED') color = 'red';

                listDiv.innerHTML += `
                    <div style="display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #eee; font-size: 13px;">
                        <div style="width: 40%; font-weight: bold;">${name}</div>
                        <div style="width: 30%; color: #555;">${amount}</div>
                        <div style="width: 30%; text-align: right; font-weight: bold; color: ${color};">${status}</div>
                    </div>
                `;
            });
        } else {
            listDiv.innerHTML = "<p style='text-align:center;'>No orders yet.</p>";
        }
    });
</script>
<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <title>Gaule Store - Order System</title>
</head>
<body>

    <div style="max-width: 400px; margin: 20px auto; padding: 20px; border: 1px solid #ccc;">
        <h3>Free Fire Diamond Order</h3>
        <input type="text" id="playerId" placeholder="Player ID" style="width: 100%; margin-bottom: 10px;">
        <select id="amount" style="width: 100%; margin-bottom: 10px;">
            <option value="115 Diamonds">115 Diamonds</option>
            <option value="240 Diamonds">240 Diamonds</option>
        </select>
        <button id="orderBtn" style="width: 100%; padding: 10px; background: red; color: white;">ORDER NOW</button>
    </div>

    <div style="max-width: 400px; margin: 20px auto; padding: 20px; border: 1px solid #ccc;">
        <h3>My Order History</h3>
        <div id="my-orders-list">लगइन गर्नुहोस्...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBn0kORKJHN_X4uVidhjulK-dAnRujOO3A",
            authDomain: "gaule-top-up-center.firebaseapp.com",
            databaseURL: "https://gaule-top-up-center-default-rtdb.firebaseio.com",
            projectId: "gaule-top-up-center",
            storageBucket: "gaule-top-up-center.firebasestorage.app",
            messagingSenderId: "645605489690",
            appId: "1:645605489690:web:10e333176acd07eec1e5a3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const provider = new GoogleAuthProvider();

        // अर्डर गर्ने काम
        document.getElementById("orderBtn").onclick = async () => {
            let user = auth.currentUser;
            if (!user) {
                await signInWithPopup(auth, provider);
                user = auth.currentUser;
            }
            if (user) {
                push(ref(db, 'orders'), {
                    email: user.email,
                    playerId: document.getElementById("playerId").value,
                    amount: document.getElementById("amount").value,
                    status: "Pending"
                }).then(() => alert("अर्डर सफल भयो!"));
            }
        };

        // अर्डर हिस्ट्री तान्ने काम
        onAuthStateChanged(auth, (user) => {
            const listDiv = document.getElementById("my-orders-list");
            if (user) {
                const ordersRef = ref(db, 'orders');
                onValue(ordersRef, (snapshot) => {
                    listDiv.innerHTML = "";
                    let found = false;
                    snapshot.forEach((child) => {
                        const d = child.val();
                        if (d.email === user.email) {
                            found = true;
                            listDiv.innerHTML += `<div style="border-bottom:1px solid #ccc; padding:5px;">
                                ID: ${d.playerId} | Status: <b>${d.status}</b>
                            </div>`;
                        }
                    });
                    if (!found) listDiv.innerHTML = "अर्डर भेटिएन।";
                });
            } else {
                listDiv.innerHTML = "लगइन गर्नुहोस्।";
            }
        });
    </script>
</body>
</html>
