<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaule Store</title>
    <style>
        body { font-family: sans-serif; margin: 0; }
        .header { display: flex; align-items: center; padding: 15px; border-bottom: 2px solid #dc2626; justify-content: space-between; }
        .menu-icon { font-size: 28px; cursor: pointer; }
        #nav-menu { display: none; position: absolute; top: 60px; left: 0; background: #fff; border: 3px solid #ccc; padding: 20px; width: 220px; z-index: 1000; box-shadow: 2px 2px 10px #ccc; }
        .search-box { display: flex; gap: 5px; margin-bottom: 15px; }
        #gameSearch { width: 100%; padding: 8px; border: 1px solid #ccc; }
        .search-btn { padding: 8px; background-color: #dc2626; color: white; border: none; cursor: pointer; }
        .close-btn { float: right; font-size: 24px; cursor: pointer; font-weight: bold; }
        #nav-menu a { display: block; padding: 12px 0; color: black; text-decoration: none; border-bottom: 1px solid #eee; }
        .store-title { font-size: 1.5rem; font-weight: bold; }
        .login-svg { width: 32px; height: 32px; cursor: pointer; stroke: black; fill: none; }
        #profile-pic { width: 35px; height: 35px; border-radius: 50%; display: none; cursor: pointer; border: 2px solid #dc2626; }
        .order-card { border: 1px solid #eee; padding: 10px; margin-top: 10px; border-radius: 5px; background: #f9f9f9; }
    </style>
</head>
<body>

<div class="header">
    <div class="menu-icon" onclick="toggleMenu()">&#9776;</div>
    <div class="store-title">GAULE <span style="color:#dc2626;">STORE</span></div>
    
    <div id="login-container" onclick="googleLogin()">
        <svg class="login-svg" viewBox="0 0 24 24" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
    </div>
    <img id="profile-pic" onclick="location.reload()">
</div>

<div id="nav-menu">
    <span class="close-btn" onclick="toggleMenu()">&times;</span>
    <div class="search-box">
        <input type="text" id="gameSearch" placeholder="Search...">
        <button class="search-btn" onclick="performSearch()">🔍</button>
    </div>
    <a href="index.html">Home</a>
    <div id="my-orders-link" style="display:none;">
        <a href="#" onclick="showOrders()">My Orders</a>
    </div>
    <a href="shop.html">Shop</a>
    <a href="contact.html">Contact Us</a>
</div>

<div id="content-area" style="padding: 20px;">
    <!-- यहाँ अर्डर वा अन्य कन्टेन्ट देखिन्छ -->
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getDatabase, ref, query, orderByChild, equalTo, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBn0kORKJHN_X4uVidhjulK-dAnRujOO3A",
        authDomain: "gaule-top-up-center.firebaseapp.com",
        databaseURL: "https://gaule-top-up-center-default-rtdb.firebaseio.com",
        projectId: "gaule-top-up-center",
        storageBucket: "gaule-top-up-center.firebasestorage.app",
        messagingSenderId: "645605489690",
        appId: "1:645605489690:web:10e333176acd07eec1e5a3"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const provider = new GoogleAuthProvider();

    window.toggleMenu = () => { document.getElementById("nav-menu").style.display = (document.getElementById("nav-menu").style.display === "block") ? "none" : "block"; };
    window.googleLogin = () => signInWithPopup(auth, provider);
    window.performSearch = () => alert("Searching: " + document.getElementById("gameSearch").value);

    // My Orders Logic (युजरको आफ्नो अर्डर मात्र देखाउने)
    window.showOrders = () => {
        toggleMenu();
        const user = auth.currentUser;
        if (!user) return;
        
        const area = document.getElementById("content-area");
        area.innerHTML = `<h2>My Orders</h2><p>Logged in as: <b>${user.email}</b></p>`;
        
        const ordersRef = query(ref(db, 'orders'), orderByChild('userId'), equalTo(user.uid));
        onValue(ordersRef, (snapshot) => {
            if (snapshot.exists()) {
                snapshot.forEach((s) => {
                    const data = s.val();
                    area.innerHTML += `<div class="order-card">Game: ${data.gameName} <br> Status: <b>${data.status}</b></div>`;
                });
            } else { area.innerHTML += "<p>कुनै अर्डर भेटिएन।</p>"; }
        });
    };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById("my-orders-link").style.display = "block";
            document.getElementById("login-container").style.display = "none";
            document.getElementById("profile-pic").style.display = "block";
            document.getElementById("profile-pic").src = user.photoURL;
        }
    });
</script>
</body>
</html>
