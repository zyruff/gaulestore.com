<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body { background: #fff; color: #000; font-family: sans-serif; margin: 0; padding: 0; }
  
  .header-container { 
    display: flex; align-items: center; justify-content: space-between; 
    padding: 15px 5%; 
  }

  /* डेस्कटपको लागि ४२% मार्जिन */
  .title-wrapper { 
    margin-left: 42%; 
    text-align: left; 
  }
  
  h1 { font-size: 1.8rem; margin: 0; font-weight: bold; }
  .store-text { color: #dc2626; }
  
  .line { width: 90%; height: 3px; background: #dc2626; margin: 5px auto 20px auto; border-radius: 2px; }
  
  .profile-wrapper { position: relative; }
  .login-icon { width: 40px; height: 40px; cursor: pointer; }
  #profile-pic { width: 40px; height: 40px; border-radius: 50%; display: none; cursor: pointer; border: 2px solid #ddd; }
  
  .dropdown-menu {
    display: none; position: absolute; right: 0; top: 50px; background: #fff; 
    border: 1px solid #eee; border-radius: 12px; padding: 10px; width: 220px; 
    box-shadow: 0 8px 16px rgba(0,0,0,0.15); z-index: 1000;
  }
  
  .user-info-card { padding: 10px; background: #fdfdfd; border-bottom: 2px solid #eee; margin-bottom: 5px; }
  .user-name { font-weight: bold; font-size: 16px; color: #333; }
  .user-email { font-size: 12px; color: #666; margin-top: 4px; }
  
  .menu-item { padding: 10px; cursor: pointer; font-size: 14px; border-bottom: 1px solid #f0f0f0; }
  .menu-item:hover { background: #f9f9f9; }

  /* मोबाइल भर्सनको लागि १५% मार्जिन */
  @media only screen and (max-width: 600px) {
    .title-wrapper { 
      margin-left: 15%; 
    }
    h1 { font-size: 1.3rem; }
  }
</style>
</head>
<body>

  <div class="header-container">
    <div class="title-wrapper">
      <h1>GAULE <span class="store-text">STORE</span></h1>
    </div>
    
    <div class="profile-wrapper">
      <div id="login-btn" class="login-icon" onclick="googleLogin()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
      </div>

      <img id="profile-pic" onclick="toggleMenu()">
      
      <div id="profile-menu" class="dropdown-menu">
        <div class="user-info-card">
          <div id="name-display" class="user-name"></div>
          <div id="email-display" class="user-email"></div>
        </div>
        <div class="menu-item" onclick="window.location.reload()">🏠 Home</div>
        <div class="menu-item" onclick="window.open('https://wa.me/9761081110', '_blank')">💬 Contact: 9761081110</div>
        <div class="menu-item" onclick="logoutUser()" style="color:red;">🚪 Logout</div>
      </div>
    </div>
  </div>

  <div class="line"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBn0kORKJHN_X4uVidhjulK-dAnRujOO3A",
      authDomain: "gaule-top-up-center.firebaseapp.com",
      projectId: "gaule-top-up-center",
      storageBucket: "gaule-top-up-center.firebasestorage.app",
      messagingSenderId: "645605489690",
      appId: "1:645605489690:web:10e333176acd07eec1e5a3"
    };

    initializeApp(firebaseConfig);
    const auth = getAuth();
    const provider = new GoogleAuthProvider();

    onAuthStateChanged(auth, (user) => {
      if (user) {
        document.getElementById("login-btn").style.display = "none";
        document.getElementById("profile-pic").style.display = "block";
        document.getElementById("profile-pic").src = user.photoURL;
        document.getElementById("name-display").innerText = user.displayName;
        document.getElementById("email-display").innerText = user.email;
      }
    });

    window.googleLogin = () => signInWithPopup(auth, provider);
    window.toggleMenu = () => {
      const menu = document.getElementById("profile-menu");
      menu.style.display = (menu.style.display === "block") ? "none" : "block";
    };
    window.logoutUser = () => signOut(auth).then(() => location.reload());
  </script>
</body>
</html>
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<style>
body{
background:#111;
color:white;
font-family:Arial;
padding:20px;
}

h1{
text-align:center;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #444;
padding:10px;
text-align:center;
}

button{
padding:8px 12px;
border:none;
cursor:pointer;
margin:2px;
border-radius:5px;
}

.complete{
background:green;
color:white;
}

.delete{
background:red;
color:white;
}
</style>

</head>
<body>

<h1>ADMIN PANEL</h1>

<div id="user"></div>

<table>
<thead>
<tr>
<th>UID</th>
<th>Product</th>
<th>Player ID</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="orders"></tbody>

</table>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
GoogleAuthProvider,
signInWithPopup,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getDatabase,
ref,
onValue,
update,
remove
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBn0kORKJHN_X4uVidhjulK-dAnRujOO3A",
  authDomain: "gaule-top-up-center.firebaseapp.com",
  databaseURL: "https://gaule-top-up-center-default-rtdb.firebaseio.com",
  projectId: "gaule-top-up-center",
  storageBucket: "gaule-top-up-center.firebasestorage.app",
  messagingSenderId: "645605489690",
  appId: "1:645605489690:web:10e333176acd07eec1e5a3"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

const provider = new GoogleAuthProvider();

signInWithPopup(auth,provider);

onAuthStateChanged(auth,(user)=>{

if(!user)return;

if(user.email !== "ffzyru@gmail.com"){
document.body.innerHTML="<h1>ACCESS DENIED</h1>";
return;
}

document.getElementById("user").innerHTML=
"Admin : "+user.email;

loadOrders();

});

function loadOrders(){

onValue(ref(db,"orders"),(snapshot)=>{

let html="";

snapshot.forEach((child)=>{

const data=child.val();

html += `
<tr>

<td>${data.uid || ""}</td>

<td>${data.product || ""}</td>

<td>${data.playerId || ""}</td>

<td>${data.status || "Pending"}</td>

<td>

<button class="complete"
onclick="completeOrder('${child.key}')">
Complete
</button>

<button class="delete"
onclick="deleteOrder('${child.key}')">
Delete
</button>

</td>

</tr>
`;

});

document.getElementById("orders").innerHTML=html;

});

}

window.completeOrder=(id)=>{

update(ref(db,"orders/"+id),{
status:"Completed"
});

};

window.deleteOrder=(id)=>{

remove(ref(db,"orders/"+id));

};

</script>

</body>
</html>
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Free Fire Order</title>
<style>
body{
font-family:Arial;
background:#111;
color:white;
padding:20px;
}
input,select,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:5px;
border:none;
}
button{
background:#ff9800;
color:white;
font-size:18px;
}
</style>
</head>
<body>

<h2>Free Fire Diamond Order</h2>

<input type="text" id="uid" placeholder="Free Fire UID">

<select id="product">
<option>25 Diamond</option>
<option>50 Diamond</option>
<option>115 Diamond</option>
<option>240 Diamond</option>
<option>610 Diamond</option>
</select>

<button onclick="placeOrder()">Order Now</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBn0kORKJHN_X4uVidhjulK-dAnRujOO3A",
  authDomain: "gaule-top-up-center.firebaseapp.com",
  databaseURL: "https://gaule-top-up-center-default-rtdb.firebaseio.com",
  projectId: "gaule-top-up-center",
  storageBucket: "gaule-top-up-center.firebasestorage.app",
  messagingSenderId: "645605489690",
  appId: "1:645605489690:web:10e333176acd07eec1e5a3"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

window.placeOrder = async () => {

const user = auth.currentUser;

if(!user){
alert("Please Login First");
return;
}

const uid = document.getElementById("uid").value;
const product = document.getElementById("product").value;

await push(ref(db,"orders"),{
uid: uid,
product: product,
email: user.email,
userId: user.uid,
status: "Pending",
time: Date.now()
});

alert("Order Submitted Successfully");
};

</script>

</body>
</html>
