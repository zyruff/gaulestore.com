<!DOCTYPE html>
<html>
<head>
  <style>
    body { background: #fff; color: #000; font-family: sans-serif; text-align: center; padding: 10px; }
    .header-container { display: flex; justify-content: space-between; align-items: center; padding: 0 20px; margin-top: 10px; }
    h1 { font-size: 1.8rem; margin: 0; font-weight: bold; }
    .store-text { color: #dc2626; }
    .login-icon { width: 40px; height: 40px; cursor: pointer; }
    #profile-pic { width: 40px; height: 40px; border-radius: 50%; display: none; cursor: pointer; }
    .line { width: 90%; height: 3px; background: #dc2626; margin: 15px auto 20px auto; }
    .sub-text { color: #555; }
  </style>
</head>
<body>

  <div class="header-container">
    <div></div>
    <h1>GAULE <span class="store-text">STORE</span></h1>
    
    <!-- Login Icon -->
    <div id="login-section">
      <div class="login-icon" id="login-btn" onclick="googleLogin()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
      </div>
      <!-- प्रोफाइल फोटो यहाँ आउँछ -->
      <img id="profile-pic" onclick="showProfile()">
    </div>
  </div>

  <div class="line"></div>
  <p class="sub-text">Fast and secure top up service</p>

  <!-- Firebase Script -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBn0kORKJHN_X4uVidhjulK-dAnRujOO3A",
      authDomain: "gaule-top-up-center.firebaseapp.com",
      projectId: "gaule-top-up-center",
      storageBucket: "gaule-top-up-center.firebasestorage.app",
      messagingSenderId: "645605489690",
      appId: "1:645605489690:web:10e333176acd07eec1e5a3"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth();
    const provider = new GoogleAuthProvider();

    let currentUser = null;

    window.googleLogin = () => {
      signInWithPopup(auth, provider).then((result) => {
        currentUser = result.user;
        document.getElementById("login-btn").style.display = "none";
        const pic = document.getElementById("profile-pic");
        pic.src = currentUser.photoURL;
        pic.style.display = "block";
      }).catch((error) => console.error(error));
    };

    window.showProfile = () => {
      if (currentUser) {
        alert("Name: " + currentUser.displayName + "\nEmail: " + currentUser.email);
      }
    };
  </script>
</body>
</html>
