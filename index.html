<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaule Store</title>
    <style>
        body { font-family: sans-serif; margin: 0; background-color: #f4f4f4; }
        .header { display: flex; align-items: center; padding: 15px; background: white; border-bottom: 2px solid #dc2626; justify-content: space-between; }
        .menu-icon { font-size: 28px; cursor: pointer; }
        #nav-menu { display: none; position: absolute; top: 0; left: 0; background: #fff; border: 1px solid #ccc; padding: 20px; width: 250px; height: 100%; z-index: 1000; box-shadow: 2px 2px 10px #ccc; }
        
        .menu-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .close-btn { font-size: 30px; cursor: pointer; color: #dc2626; }
        .search-box { display: flex; gap: 5px; margin-bottom: 20px; }
        #gameSearch { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        
        .header-right { display: flex; align-items: center; gap: 10px; position: relative; }
        #profile-pic { width: 35px; height: 35px; border-radius: 50%; display: none; cursor: pointer; border: 2px solid #dc2626; }
        
        /* प्रोफाइल ड्रपडाउन */
        #profile-dropdown { display: none; position: absolute; top: 50px; right: 0; background: white; border: 1px solid #ccc; padding: 15px; width: 200px; box-shadow: 0px 4px 10px rgba(0,0,0,0.1); border-radius: 8px; text-align: center; z-index: 1000; }
        .user-name { font-weight: bold; font-size: 14px; margin-bottom: 5px; }
        .user-email { font-size: 12px; color: #666; margin-bottom: 10px; }
        .change-name { font-size: 11px; color: #dc2626; text-decoration: none; display: block; margin-bottom: 15px; }
        /* Logout बटनको लम्बाइ हटाइयो */
        .logout-btn { background: #dc2626; color: white; border: none; padding: 8px 20px; cursor: pointer; border-radius: 4px; }
        
        #nav-menu a { display: block; padding: 12px 0; color: black; text-decoration: none; border-bottom: 1px solid #eee; }
        .order-card { background: white; border-left: 5px solid #dc2626; padding: 15px; margin-bottom: 10px; border-radius: 5px; box-shadow: 0 2px 5px #ddd; }
        .store-title { font-size: 1.5rem; font-weight: bold; }
        .login-svg { width: 32px; height: 32px; cursor: pointer; stroke: black; fill: none; }
    </style>
</head>
<body>

<div class="header">
    <div class="menu-icon" onclick="toggleMenu()">&#9776;</div>
    <div class="store-title">GAULE <span style="color:#dc2626;">STORE</span></div>
    
    <div class="header-right">
        <div id="login-container" onclick="googleLogin()">
            <svg class="login-svg" viewBox="0 0 24 24" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        </div>
        <img id="profile-pic" onclick="toggleProfile()">
        
        <div id="profile-dropdown">
            <div id="display-name" class="user-name"></div>
            <div id="display-email" class="user-email"></div>
            <a href="https://myaccount.google.com/personal-info" target="_blank" class="change-name">Change Name</a>
            <button class="logout-btn" onclick="logoutUser()">Logout</button>
        </div>
    </div>
</div>

<div id="nav-menu">
    <div class="menu-header">
        <span style="font-weight:bold;">Menu</span>
        <span class="close-btn" onclick="toggleMenu()">&times;</span>
    </div>
    
    <div class="search-box">
        <input type="text" id="gameSearch" placeholder="Search games...">
    </div>
    
    <a href="index.html">Home</a>
    <div id="my-orders-link" style="display:none;"><a href="#" onclick="showOrders()">My Orders</a></div>
    <a href="shop.html">Shop</a>
    <a href="https://wa.me/9779761081110" target="_blank">Contact Us</a>
</div>

<div id="content-area" style="padding: 20px;"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getDatabase, ref, query, orderByChild, equalTo, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBn0kORKJHN_X4uVidhjulK-dAnRujOO3A",
        authDomain: "gaule-top-up-center.firebaseapp.com",
        databaseURL: "https://gaule-top-up-center-default-rtdb.firebaseio.com",
        projectId: "gaule-top-up-center",
        storageBucket: "gaule-top-up-center.firebasestorage.app",
        messagingSenderId: "645605489690",
        appId: "1:645605489690:web:10e333176acd07eec1e5a3"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const provider = new GoogleAuthProvider();

    window.toggleMenu = () => { const m = document.getElementById("nav-menu"); m.style.display = (m.style.display === "block") ? "none" : "block"; };
    window.toggleProfile = () => { const d = document.getElementById("profile-dropdown"); d.style.display = (d.style.display === "block") ? "none" : "block"; };
    
    window.googleLogin = () => signInWithPopup(auth, provider);
    window.logoutUser = () => signOut(auth).then(() => location.reload());

    window.showOrders = () => {
        toggleMenu();
        const user = auth.currentUser;
        if (!user) return;
        const area = document.getElementById("content-area");
        area.innerHTML = `<h2>My Orders</h2>`;
        const ordersRef = query(ref(db, 'orders'), orderByChild('userId'), equalTo(user.uid));
        onValue(ordersRef, (snapshot) => {
            area.innerHTML = `<h2>My Orders</h2>`;
            if (snapshot.exists()) {
                snapshot.forEach((s) => {
                    const data = s.val();
                    area.innerHTML += `
                        <div class="order-card">
                            <p>Game: <b>${data.gameName}</b></p>
                            <p>Amount: <b>${data.amount || 'N/A'}</b></p>
                            <p>Status: <b style="color:${data.status === 'Completed' ? 'green' : 'orange'}">${data.status}</b></p>
                        </div>`;
                });
            } else { area.innerHTML += "<p>कुनै अर्डर भेटिएन।</p>"; }
        });
    };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById("my-orders-link").style.display = "block";
            document.getElementById("login-container").style.display = "none";
            document.getElementById("profile-pic").style.display = "block";
            document.getElementById("profile-pic").src = user.photoURL;
            document.getElementById("display-name").innerText = user.displayName;
            document.getElementById("display-email").innerText = user.email;
        }
    });
</script>
</body>
</html>
