<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaule Store | Ultimate Top-Up Store</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0f111a; color: #ffffff; }
        
        /* Header & Logo */
        header { background: #161925; padding: 20px 5%; border-bottom: 2px solid #ff4757; }
        .navbar { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: auto; }
        .logo { font-size: 28px; font-weight: bold; color: #ffffff; text-transform: uppercase; }
        .logo span { color: #ff4757; }
        
        /* Auth Styles */
        .btn-auth { background: #ff4757; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .user-profile { display: flex; align-items: center; gap: 10px; }
        .profile-img { width: 35px; height: 35px; border-radius: 50%; border: 2px solid #ff4757; }

        /* Container & Grid */
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .games-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        .game-card { background: #161925; padding: 20px; border-radius: 12px; border: 1px solid #2f3542; }
        .game-img { width: 100%; height: 180px; object-fit: cover; border-radius: 8px; margin-bottom: 15px; }
        .topup-select, .player-id-input { width: 100%; padding: 10px; background: #0f111a; color: white; border: 1px solid #2f3542; border-radius: 5px; margin-bottom: 10px; }
        .btn-buy { background: #ff4757; color: white; padding: 12px; width: 100%; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-free { background: #2ed573; color: white; padding: 12px; width: 100%; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <header>
        <div class="navbar">
            <div class="logo">GAULE<span>STORE</span></div>
            <div id="authArea"><button id="loginBtn" class="btn-auth">Login</button></div>
        </div>
    </header>

    <main class="container">
        <div class="games-grid">
            <!-- PUBG -->
            <div class="game-card">
                <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=500" class="game-img">
                <h3>PUBG Mobile (UC)</h3>
                <input type="text" placeholder="Enter Player ID" class="player-id-input">
                <select class="topup-select">
                    <option>60 UC - Rs. 150</option>
                    <option>325 UC - Rs. 700</option>
                </select>
                <button class="btn-buy" onclick="alert('Proceeding to Checkout...')">Buy Now</button>
                <button class="btn-free" onclick="alert('Free UC Claimed!')">Claim Free UC</button>
            </div>

            <!-- Free Fire -->
            <div class="game-card">
                <img src="https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=500" class="game-img">
                <h3>Free Fire</h3>
                <input type="text" placeholder="Enter Player ID" class="player-id-input">
                <select class="topup-select">
                    <option>100 Diamonds - Rs. 120</option>
                    <option>210 Diamonds - Rs. 240</option>
                </select>
                <button class="btn-buy" onclick="alert('Proceeding to Checkout...')">Buy Now</button>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBn0kORKJHN_X4uVidhjulK-dAnRujOO3A",
            authDomain: "gaule-top-up-center.firebaseapp.com",
            projectId: "gaule-top-up-center",
            storageBucket: "gaule-top-up-center.firebasestorage.app",
            messagingSenderId: "645605489690",
            appId: "1:645605489690:web:10e333176acd07eec1e5a3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        const authArea = document.getElementById("authArea");

        onAuthStateChanged(auth, (user) => {
            if (user) {
                authArea.innerHTML = `
                    <div class="user-profile">
                        <span style="color:white;">${user.displayName}</span>
                        <img src="${user.photoURL}" class="profile-img">
                        <button onclick="signOut(auth)" class="btn-auth" style="background:#555;">Logout</button>
                    </div>
                `;
            } else {
                authArea.innerHTML = `<button id="loginBtn" class="btn-auth">Login</button>`;
                document.getElementById("loginBtn").onclick = () => signInWithPopup(auth, provider);
            }
        });
    </script>
</body>
</html>
