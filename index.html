<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAULE STORE</title>
    <style>
        body { margin: 0; background: #0f0f1a; color: white; font-family: sans-serif; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px; border-bottom: 2px solid #2a2a40; }
        .logo-text { font-size: 1.5rem; font-weight: bold; }
        .red { color: #ff0055; }
        .user-profile { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #00d4ff; cursor: pointer; }
        .btn { border: 1px solid #ff0055; padding: 8px 20px; border-radius: 20px; cursor: pointer; background: transparent; color: white; }
        
        /* Dropdown Style */
        .dropdown { position: relative; display: inline-block; }
        .dropdown-content { display: none; position: absolute; right: 0; background-color: #1a1a2e; min-width: 200px; padding: 15px; border-radius: 10px; border: 1px solid #444; z-index: 1; }
        .dropdown:hover .dropdown-content { display: block; }
        
        #page-container { padding: 20px; }
        .order-card { background: #1a1a2e; padding: 15px; border-radius: 10px; margin-top: 10px; border: 1px solid #444; }
    </style>
</head>
<body>

    <header>
        <div class="logo-text"><span class="red">GAULE</span> STORE</div>
        <div id="auth-container">
            <button class="btn" onclick="loginWithGoogle()">Login</button>
        </div>
    </header>

    <div id="page-container"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";
        import { getDatabase, ref, query, orderByChild, equalTo, get } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBn0kORKJHN_X4uVidhjulK-dAnRujOO3A",
            authDomain: "gaule-top-up-center.firebaseapp.com",
            databaseURL: "https://gaule-top-up-center-default-rtdb.firebaseio.com",
            projectId: "gaule-top-up-center",
            storageBucket: "gaule-top-up-center.firebasestorage.app",
            messagingSenderId: "645605489690",
            appId: "1:645605489690:web:10e333176acd07eec1e5a3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const provider = new GoogleAuthProvider();

        window.loginWithGoogle = () => signInWithPopup(auth, provider);
        window.logout = () => signOut(auth).then(() => location.reload());

        onAuthStateChanged(auth, (user) => {
            const authContainer = document.getElementById('auth-container');
            if (user) {
                authContainer.innerHTML = `
                    <div class="dropdown">
                        <img src="${user.photoURL}" class="user-profile">
                        <div class="dropdown-content">
                            <p><b>${user.displayName}</b></p>
                            <p style="font-size: 0.8rem; color: #aaa;">${user.email}</p>
                            <hr style="border: 0.5px solid #444;">
                            <p onclick="showMyOrders()" style="cursor:pointer; color:#00d4ff;">My Orders</p>
                            <p onclick="logout()" style="cursor:pointer; color:#ff0055;">Logout</p>
                        </div>
                    </div>`;
            } else {
                authContainer.innerHTML = `<button class="btn" onclick="loginWithGoogle()">Login</button>`;
            }
        });

        window.showMyOrders = () => {
            const user = auth.currentUser;
            const container = document.getElementById('page-container');
            container.innerHTML = "<h3>My Order History</h3>";
            
            const ordersRef = query(ref(db, 'orders'), orderByChild('userId'), equalTo(user.uid));
            get(ordersRef).then((snapshot) => {
                if (snapshot.exists()) {
                    snapshot.forEach((child) => {
                        let data = child.val();
                        container.innerHTML += `<div class="order-card">Item: ${data.item || 'N/A'} | Status: ${data.status}</div>`;
                    });
                } else {
                    container.innerHTML += "<p>No orders found.</p>";
                }
            });
        };
    </script>

<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel - TopUp</title>
</head>
<body>

<h2>🔥 Admin Panel</h2>

<div id="status">Loading...</div>
<div id="orders"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

// 🔥 Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyBn0kORKJHN_X4uVidhjulK-dAnRujOO3A",
  authDomain: "gaule-top-up-center.firebaseapp.com",
  databaseURL: "https://gaule-top-up-center-default-rtdb.firebaseio.com",
  projectId: "gaule-top-up-center",
  storageBucket: "gaule-top-up-center.firebasestorage.app",
  messagingSenderId: "645605489690",
  appId: "1:645605489690:web:10e333176acd07eec1e5a3"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

// 🔐 Login function (Google)
window.login = function () {
  const provider = new GoogleAuthProvider();
  signInWithPopup(auth, provider);
};

// 🔐 Auth check
onAuthStateChanged(auth, (user) => {

  if (!user) {
    document.getElementById("status").innerHTML = `
      <button onclick="login()">Login with Google</button>
    `;
    return;
  }

  // 🚫 Only admin allowed
  if (user.email !== "ffzyru@gmail.com") {
    document.body.innerHTML = "<h2>Access Denied ❌</h2>";
    return;
  }

  document.getElementById("status").innerHTML = "Welcome Admin ✔";

  loadOrders();
});

// 📦 Load Orders
function loadOrders() {
  const ordersRef = ref(db, "orders");

  onValue(ordersRef, (snapshot) => {

    let html = "";

    snapshot.forEach((child) => {

      const data = child.val();
      const id = child.key;

      html += `
        <div style="border:1px solid #000;padding:10px;margin:10px;">
          <p><b>UID:</b> ${data.uid}</p>
          <p><b>Diamond:</b> ${data.diamond}</p>
          <p><b>Status:</b> ${data.status}</p>

          <button onclick="completeOrder('${id}')">✔ Complete</button>
          <button onclick="deleteOrder('${id}')">❌ Delete</button>
        </div>
      `;
    });

    document.getElementById("orders").innerHTML = html;
  });
}

// ✔ Complete order
window.completeOrder = function(id){
  update(ref(db, "orders/" + id), {
    status: "Completed"
  });
};

// ❌ Delete order
window.deleteOrder = function(id){
  remove(ref(db, "orders/" + id));
};

</script>

</body>
</html>
