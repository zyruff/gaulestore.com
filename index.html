<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body { background: #fff; color: #000; font-family: sans-serif; margin: 0; padding: 0; }
  
  .header-container { 
    display: flex; align-items: center; justify-content: space-between; 
    padding: 15px 5%; 
  }

  /* Title ko centre se thoda left mein set kiya */
  .title-wrapper { 
    margin-left: 10%; 
    text-align: left; 
  }
  
  h1 { font-size: 1.8rem; margin: 0; font-weight: bold; }
  .store-text { color: #dc2626; }
  
  .line { width: 90%; height: 3px; background: #dc2626; margin: 5px auto 20px auto; border-radius: 2px; }
  
  .profile-wrapper { position: relative; }
  .login-icon { width: 40px; height: 40px; cursor: pointer; }
  #profile-pic { width: 40px; height: 40px; border-radius: 50%; display: none; cursor: pointer; border: 2px solid #ddd; }
  
  /* Profile dropdown menu style */
  .dropdown-menu {
    display: none; position: absolute; right: 0; top: 50px; background: #fff; 
    border: 1px solid #eee; border-radius: 12px; padding: 10px; width: 220px; 
    box-shadow: 0 8px 16px rgba(0,0,0,0.15); z-index: 1000;
  }
  
  /* Profile info ka special card design */
  .user-info-card { padding: 10px; background: #fdfdfd; border-bottom: 2px solid #eee; margin-bottom: 5px; }
  .user-name { font-weight: bold; font-size: 16px; color: #333; }
  .user-email { font-size: 12px; color: #666; margin-top: 4px; }
  
  .menu-item { padding: 10px; cursor: pointer; font-size: 14px; border-bottom: 1px solid #f0f0f0; }
  .menu-item:hover { background: #f9f9f9; }
</style>
</head>
<body>

  <div class="header-container">
    <div class="title-wrapper">
      <h1>GAULE <span class="store-text">STORE</span></h1>
    </div>
    
    <div class="profile-wrapper">
      <div id="login-btn" class="login-icon" onclick="googleLogin()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
      </div>

      <img id="profile-pic" onclick="toggleMenu()">
      
      <div id="profile-menu" class="dropdown-menu">
        <div class="user-info-card">
          <div id="name-display" class="user-name"></div>
          <div id="email-display" class="user-email"></div>
        </div>
        <div class="menu-item" onclick="window.location.reload()">🏠 Home</div>
        <div class="menu-item" onclick="window.open('https://wa.me/9761081110', '_blank')">💬 Contact: 9761081110</div>
        <div class="menu-item" onclick="logoutUser()" style="color:red;">🚪 Logout</div>
      </div>
    </div>
  </div>

  <div class="line"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBn0kORKJHN_X4uVidhjulK-dAnRujOO3A",
      authDomain: "gaule-top-up-center.firebaseapp.com",
      projectId: "gaule-top-up-center",
      storageBucket: "gaule-top-up-center.firebasestorage.app",
      messagingSenderId: "645605489690",
      appId: "1:645605489690:web:10e333176acd07eec1e5a3"
    };

    initializeApp(firebaseConfig);
    const auth = getAuth();
    const provider = new GoogleAuthProvider();

    onAuthStateChanged(auth, (user) => {
      if (user) {
        document.getElementById("login-btn").style.display = "none";
        document.getElementById("profile-pic").style.display = "block";
        document.getElementById("profile-pic").src = user.photoURL;
        document.getElementById("name-display").innerText = user.displayName;
        document.getElementById("email-display").innerText = user.email;
      }
    });

    window.googleLogin = () => signInWithPopup(auth, provider);
    window.toggleMenu = () => {
      const menu = document.getElementById("profile-menu");
      menu.style.display = (menu.style.display === "block") ? "none" : "block";
    };
    window.logoutUser = () => signOut(auth).then(() => location.reload());
  </script>
</body>
</html>
