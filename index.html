<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAULE STORE</title>
    <style>
        body { margin: 0; background: #0f0f1a; color: white; font-family: sans-serif; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px; border-bottom: 2px solid #2a2a40; }
        .logo-text { font-size: 1.5rem; font-weight: bold; letter-spacing: 1px; }
        .red { color: #ff0055; }
        .login-btn { border: 1px solid #ff0055; padding: 8px 20px; border-radius: 20px; cursor: pointer; background: transparent; color: white; }
        .user-profile { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #00d4ff; cursor: pointer; object-fit: cover; }
        #page-container { padding: 20px; }
        .order-card { background: #1a1a2e; padding: 15px; border-radius: 10px; margin-top: 10px; border: 1px solid #444; }
    </style>
</head>
<body>

    <header>
        <div class="logo-text"><span class="red">GAULE</span> STORE</div>
        <div id="auth-container">
            <button class="login-btn" onclick="loginWithGoogle()">Login</button>
        </div>
    </header>

    <div id="page-container">
        </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";
        import { getDatabase, ref, query, orderByChild, equalTo, get } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        // Firebase Configuration (तपाईंको API Key र Database URL यहाँ जोडिएको छ)
        const firebaseConfig = {
            apiKey: "AIzaSyBn0kORKJHN_X4uVidhjulK-dAnRujOO3A",
            authDomain: "gaule-top-up-center.firebaseapp.com",
            databaseURL: "https://gaule-top-up-center-default-rtdb.firebaseio.com",
            projectId: "gaule-top-up-center",
            storageBucket: "gaule-top-up-center.firebasestorage.app",
            messagingSenderId: "645605489690",
            appId: "1:645605489690:web:10e333176acd07eec1e5a3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const provider = new GoogleAuthProvider();

        window.loginWithGoogle = () => signInWithPopup(auth, provider);

        onAuthStateChanged(auth, (user) => {
            const authContainer = document.getElementById('auth-container');
            if (user) {
                authContainer.innerHTML = `<img src="${user.photoURL}" class="user-profile" onclick="showMyOrders()">`;
            } else {
                authContainer.innerHTML = `<button class="login-btn" onclick="loginWithGoogle()">Login</button>`;
                document.getElementById('page-container').innerHTML = ""; // लगआउट भएपछि खाली गर्ने
            }
        });

        window.showMyOrders = () => {
            const user = auth.currentUser;
            const container = document.getElementById('page-container');
            container.innerHTML = "<h3>My Order History</h3>";
            
            const ordersRef = query(ref(db, 'orders'), orderByChild('userId'), equalTo(user.uid));
            
            get(ordersRef).then((snapshot) => {
                if (snapshot.exists()) {
                    snapshot.forEach((child) => {
                        let data = child.val();
                        container.innerHTML += `<div class="order-card">
                            Item: ${data.item || 'N/A'}<br>
                            Status: <span style="color:#00d4ff">${data.status || 'Pending'}</span>
                        </div>`;
                    });
                } else {
                    container.innerHTML += "<p>कुनै अर्डर भेटिएन।</p>";
                }
            }).catch((error) => {
                console.error("Error fetching data: ", error);
                container.innerHTML += "<p>डाटा लोड गर्न समस्या भयो।</p>";
            });
        };
    </script>
</body>
</html>
