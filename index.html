<!DOCTYPE html>
<html>
<head>
  <title>GauLe Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body{
      margin:0;
      font-family:Arial;
      background: linear-gradient(180deg,#070b18,#0b1220);
      color:white;
      text-align:center;
    }

    .header{
      background: linear-gradient(90deg,#ff0000,#ff8c00);
      padding:18px;
      font-size:22px;
      font-weight:bold;
      letter-spacing:1px;
      box-shadow:0 4px 10px rgba(0,0,0,0.4);
    }

    .subtitle{
      margin-top:10px;
      color:#aaa;
      font-size:14px;
    }

    /* GAME CARDS */
    .games{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:12px;
      padding:15px;
    }

    .game{
      background: rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.1);
      padding:25px;
      border-radius:15px;
      cursor:pointer;
      transition:0.3s;
      backdrop-filter: blur(6px);
    }

    .game:hover{
      transform:scale(1.05);
      background: rgba(255,255,255,0.1);
    }

    /* PRODUCT PAGE */
    .box{
      display:none;
      padding:15px;
    }

    .title{
      font-size:20px;
      margin:10px 0;
      color:#ffcc00;
    }

    .card{
      background: rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.1);
      padding:15px;
      margin:10px;
      border-radius:12px;
      cursor:pointer;
      transition:0.3s;
    }

    .card:hover{
      background: rgba(255,255,255,0.15);
      transform:scale(1.03);
    }

    button{
      width:90%;
      padding:12px;
      margin-top:15px;
      border:none;
      border-radius:10px;
      background: linear-gradient(90deg,#ff0000,#ff7b00);
      color:white;
      font-size:16px;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      transform:scale(1.05);
    }

    .back{
      margin-top:10px;
      color:#aaa;
      cursor:pointer;
      font-size:14px;
    }
  </style>
</head>

<body>

<div class="header">🔥 GAULE STORE</div>
<div class="subtitle">Top Up Gaming Shop</div>

<!-- GAME LIST -->
<div id="home">

  <h3>Select Your Game</h3>

  <div class="games">

    <div class="game" onclick="openGame('Free Fire')">
      🔥 Free Fire
    </div>

    <div class="game" onclick="openGame('PUBG Mobile')">
      🎮 PUBG Mobile
    </div>

  </div>
</div>

<!-- PRODUCT PAGE -->
<div class="box" id="product">

  <div class="title" id="gameTitle"></div>

  <div class="card" onclick="selectPack('100 Diamonds')">
    💎 100 Diamonds
  </div>

  <div class="card" onclick="selectPack('310 Diamonds')">
    💎 310 Diamonds
  </div>

  <div class="card" onclick="selectPack('520 Diamonds')">
    💎 520 Diamonds
  </div>

  <div class="card" onclick="selectPack('1060 Diamonds')">
    💎 1060 Diamonds
  </div>

  <button onclick="order()">ORDER NOW</button>

  <div class="back" onclick="goBack()">← Back to Games</div>

</div>

<script>

let selectedGame = "";
let selectedPack = "";

function openGame(game){
  selectedGame = game;
  document.getElementById("home").style.display="none";
  document.getElementById("product").style.display="block";
  document.getElementById("gameTitle").innerText = game + " Top Up";
}

function selectPack(pack){
  selectedPack = pack;
  alert("Selected: " + pack);
}

function order(){
  if(!selectedPack){
    alert("Please select a pack");
    return;
  }

  alert(
    "🔥 Order Successful!\n\nGame: " + selectedGame +
    "\nPack: " + selectedPack
  );
}

function goBack(){
  document.getElementById("product").style.display="none";
  document.getElementById("home").style.display="block";
}

</script>

</body>
</html>
